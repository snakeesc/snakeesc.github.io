<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>escape the snake 🐍 – player runs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: monospace;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }

    .overlay-bg {
      width: 100%;
      max-width: 1080px;
    }

    .panel {
      background: #111;
      padding: 18px 22px;
      border-radius: 10px;
      border: 1px solid #444;
      color: #fff;
      box-shadow: 0 0 18px rgba(0,0,0,0.6);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .subtitle {
      margin-bottom: 14px;
      font-size: 13px;
      opacity: 0.9;
    }

    .status {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 10px;
    }

    .terminal-section {
      border-top: 1px solid #333;
      padding-top: 16px;
      margin-top: 16px;
    }

    .terminal-section:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .section-title {
      font-size: 13px;
      margin: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    .terminal-list {
      display: grid;
      gap: 8px;
    }

    .terminal-row {
      background: #181818;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .terminal-row strong {
      color: #9bffb1;
      font-weight: bold;
    }

    .small-note {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 16px;
    }

    a {
      color: #9bffb1;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 720px) {
      .terminal-row {
        font-size: 12px;
      }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9518470870792689"
      crossorigin="anonymous"></script>
</head>
<body>
  <div class="overlay-bg">
    <div class="panel">
      <div class="title">escape the snake 🐍</div>
      <div class="subtitle">-- Player Runs / Live Run Log --</div>

      <div id="summaryStatus" class="status">Loading summary…</div>

      <div class="terminal-section">
        <div class="section-title">overall totals</div>
        <div id="statsList" class="terminal-list"></div>
      </div>

      <div class="terminal-section">
        <div class="section-title">top 3 leaderboard holders</div>
        <div id="top3List" class="terminal-list"></div>
      </div>

      <div class="terminal-section">
        <div class="section-title">recent runs</div>
        <div id="runsStatus" class="status">Loading recent runs…</div>
        <div id="runsLog" class="terminal-list"></div>
      </div>

      <div class="small-note">
        showing the most recent 100 completed runs from
        <a href="https://snakeesc.github.io/">snakeesc.github.io</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const WORKER_BASE = "https://lucky-king-0d37.danielssouthworth.workers.dev";

      const summaryStatusEl = document.getElementById("summaryStatus");
      const runsStatusEl = document.getElementById("runsStatus");
      const statsListEl = document.getElementById("statsList");
      const top3ListEl = document.getElementById("top3List");
      const runsLogEl = document.getElementById("runsLog");

      function formatNumber(value) {
        const n = Number(value || 0);
        return Number.isFinite(n) ? n.toLocaleString() : "0";
      }

      function formatTimeSeconds(value) {
        const n = Number(value || 0);
        if (!Number.isFinite(n)) return "0.0";
        return n.toLocaleString(undefined, {
          minimumFractionDigits: 1,
          maximumFractionDigits: 1
        });
      }

      function formatDate(value) {
        if (!value) return "—";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString();
      }

      fetch(WORKER_BASE + "/updates-summary")
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          if (!data) {
            summaryStatusEl.textContent = "Unable to load summary.";
            return;
          }

          statsListEl.innerHTML = `
            <div class="terminal-row"><strong>TOTAL_USERS:</strong> ${formatNumber(data.totalUsers)}</div>
            <div class="terminal-row"><strong>TOTAL_RUNS:</strong> ${formatNumber(data.totalRuns)}</div>
            <div class="terminal-row"><strong>TOTAL_PLAYTIME:</strong> ${formatTimeSeconds(data.totalPlaytime)}s</div>
            <div class="terminal-row"><strong>FROGS_EATEN:</strong> ${formatNumber(data.totalFrogsEaten)}</div>
            <div class="terminal-row"><strong>TOTAL_SCORE:</strong> ${formatNumber(data.totalScore)}</div>
          `;

          const top3 = Array.isArray(data.top3) ? data.top3 : [];
          top3ListEl.innerHTML = "";

          if (!top3.length) {
            top3ListEl.innerHTML = `<div class="terminal-row">No leaderboard entries yet.</div>`;
          } else {
            top3.forEach((entry, index) => {
              const row = document.createElement("div");
              row.className = "terminal-row";
              row.innerHTML = `
                <strong>#${index + 1}</strong>
                PLAYER=${entry.tag || "Anonymous Frog"}
                &nbsp;&nbsp; BEST_SCORE=${formatNumber(entry.bestScore)}
                &nbsp;&nbsp; BEST_TIME=${formatTimeSeconds(entry.bestTime)}s
              `;
              top3ListEl.appendChild(row);
            });
          }

          summaryStatusEl.textContent = "Summary loaded.";
        })
        .catch(() => {
          summaryStatusEl.textContent = "Unable to load summary.";
        });

      fetch(WORKER_BASE + "/runs")
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          const runs = Array.isArray(data?.runs) ? data.runs : [];

          runsLogEl.innerHTML = "";

          if (!runs.length) {
            runsStatusEl.textContent = "No runs found.";
            return;
          }

          runs.forEach((run) => {
            const item = document.createElement("div");
            item.className = "terminal-row";
            item.innerHTML = `
              <strong>[${formatDate(run.createdAt)}]</strong>
              PLAYER=${run.tag || "Anonymous Frog"}
              &nbsp;&nbsp; SCORE=${formatNumber(run.score)}
              &nbsp;&nbsp; TIME=${formatTimeSeconds(run.time)}s
              &nbsp;&nbsp; FROGS=${formatNumber(run.frogsEaten)}
              &nbsp;&nbsp; SNAKES=${formatNumber(run.snakesSeen)}
            `;
            runsLogEl.appendChild(item);
          });

          runsStatusEl.textContent = `Showing ${runs.length} most recent runs.`;
        })
        .catch(() => {
          runsStatusEl.textContent = "Unable to load recent runs.";
        });
    })();
  </script>
</body>
</html>
