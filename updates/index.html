<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>escape the snake 🐍 – player runs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: monospace;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }

    .overlay-bg {
      width: 100%;
      max-width: 1080px;
    }

    .panel {
      background: #111;
      padding: 18px 22px;
      border-radius: 10px;
      border: 1px solid #444;
      color: #fff;
      box-shadow: 0 0 18px rgba(0,0,0,0.6);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .subtitle {
      margin-bottom: 14px;
      font-size: 13px;
      opacity: 0.9;
    }

    .section-title {
      font-size: 13px;
      margin: 18px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    .status {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 10px;
    }

    .terminal-block {
      border: 1px solid #333;
      border-radius: 8px;
      background: #0b0b0b;
      padding: 12px;
      margin-bottom: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 0;
    }

    .stat-card {
      background: #181818;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #9bffb1;
    }

    .top3-list {
      display: grid;
      gap: 8px;
      margin-bottom: 0;
    }

    .top3-item {
      background: #181818;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 60px 1fr auto auto;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }

    .rank {
      color: #9bffb1;
      font-weight: bold;
    }

    .player {
      font-weight: bold;
    }

    .score,
    .time {
      opacity: 0.95;
    }

    .runs-log {
      display: grid;
      gap: 8px;
    }

    .run-log-item {
      background: #181818;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .run-log-line {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .run-log-line span {
      white-space: nowrap;
    }

    .muted {
      opacity: 0.8;
    }

    .runs-table-wrap {
      overflow-x: auto;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0b0b0b;
      margin-top: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: #181818;
    }

    th, td {
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid #222;
      white-space: nowrap;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.9;
    }

    tbody tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    .num {
      text-align: right;
    }

    .small-note {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 12px;
    }

    a {
      color: #9bffb1;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 720px) {
      .top3-item {
        grid-template-columns: 50px 1fr;
      }

      .score,
      .time {
        grid-column: 2;
      }

      .run-log-line {
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9518470870792689"
      crossorigin="anonymous"></script>
</head>
<body>
  <div class="overlay-bg">
    <div class="panel">
      <div class="title">escape the snake 🐍</div>
      <div class="subtitle">-- Player Runs / Live Run Log --</div>

      <div id="summaryStatus" class="status">Loading summary…</div>

      <div class="terminal-block">
        <div class="section-title">overall totals</div>
        <div id="statsGrid" class="stats-grid"></div>
      </div>

      <div class="terminal-block">
        <div class="section-title">top 3 leaderboard holders</div>
        <div id="top3List" class="top3-list"></div>
      </div>

      <div class="terminal-block">
        <div class="section-title">recent runs</div>
        <div id="runsStatus" class="status">Loading recent runs…</div>
        <div id="runsLog" class="runs-log"></div>
      </div>

      <div class="runs-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Player</th>
              <th class="num">Score</th>
              <th class="num">Time (s)</th>
              <th class="num">Frogs Eaten</th>
              <th class="num">Snakes</th>
            </tr>
          </thead>
          <tbody id="runsBody"></tbody>
        </table>
      </div>

      <div class="small-note">
        showing the most recent 100 completed runs from
        <a href="https://snakeesc.github.io/">snakeesc.github.io</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const WORKER_BASE = "https://lucky-king-0d37.danielssouthworth.workers.dev";

      const summaryStatusEl = document.getElementById("summaryStatus");
      const runsStatusEl = document.getElementById("runsStatus");
      const statsGridEl = document.getElementById("statsGrid");
      const top3ListEl = document.getElementById("top3List");
      const runsLogEl = document.getElementById("runsLog");
      const runsBodyEl = document.getElementById("runsBody");

      function formatNumber(value) {
        const n = Number(value || 0);
        return Number.isFinite(n) ? n.toLocaleString() : "0";
      }

      function formatTimeSeconds(value) {
        const n = Number(value || 0);
        if (!Number.isFinite(n)) return "0.0";
        return n.toLocaleString(undefined, {
          minimumFractionDigits: 1,
          maximumFractionDigits: 1
        });
      }

      function formatDate(value) {
        if (!value) return "—";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString();
      }

      fetch(WORKER_BASE + "/updates-summary")
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          if (!data) {
            summaryStatusEl.textContent = "Unable to load summary.";
            return;
          }

          statsGridEl.innerHTML = `
            <div class="stat-card">
              <div class="stat-label">Total Users</div>
              <div class="stat-value">${formatNumber(data.totalUsers)}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Total Runs</div>
              <div class="stat-value">${formatNumber(data.totalRuns)}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Total Playtime</div>
              <div class="stat-value">${formatTimeSeconds(data.totalPlaytime)}s</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Total Frogs Eaten</div>
              <div class="stat-value">${formatNumber(data.totalFrogsEaten)}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Total Score</div>
              <div class="stat-value">${formatNumber(data.totalScore)}</div>
            </div>
          `;

          const top3 = Array.isArray(data.top3) ? data.top3 : [];
          top3ListEl.innerHTML = "";

          if (!top3.length) {
            top3ListEl.innerHTML = `<div class="status">No leaderboard entries yet.</div>`;
          } else {
            top3.forEach((entry, index) => {
              const row = document.createElement("div");
              row.className = "top3-item";
              row.innerHTML = `
                <div class="rank">#${index + 1}</div>
                <div class="player">${entry.tag || "Anonymous Frog"}</div>
                <div class="score">Score: ${formatNumber(entry.bestScore)}</div>
                <div class="time">Time: ${formatTimeSeconds(entry.bestTime)}s</div>
              `;
              top3ListEl.appendChild(row);
            });
          }

          summaryStatusEl.textContent = "Summary loaded.";
        })
        .catch(() => {
          summaryStatusEl.textContent = "Unable to load summary.";
        });

      fetch(WORKER_BASE + "/runs")
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          const runs = Array.isArray(data?.runs) ? data.runs : [];

          runsBodyEl.innerHTML = "";
          runsLogEl.innerHTML = "";

          if (!runs.length) {
            runsStatusEl.textContent = "No runs found.";
            return;
          }

          runs.forEach((run) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${formatDate(run.createdAt)}</td>
              <td>${run.tag || "Anonymous Frog"}</td>
              <td class="num">${formatNumber(run.score)}</td>
              <td class="num">${formatTimeSeconds(run.time)}</td>
              <td class="num">${formatNumber(run.frogsEaten)}</td>
              <td class="num">${formatNumber(run.snakesSeen)}</td>
            `;
            runsBodyEl.appendChild(tr);
          });

          runs.slice(0, 12).forEach((run) => {
            const item = document.createElement("div");
            item.className = "run-log-item";
            item.innerHTML = `
              <div class="run-log-line">
                <span>[${formatDate(run.createdAt)}]</span>
                <span>PLAYER=${run.tag || "Anonymous Frog"}</span>
                <span>SCORE=${formatNumber(run.score)}</span>
                <span>TIME=${formatTimeSeconds(run.time)}s</span>
                <span>FROGS=${formatNumber(run.frogsEaten)}</span>
                <span>SNAKES=${formatNumber(run.snakesSeen)}</span>
              </div>
            `;
            runsLogEl.appendChild(item);
          });

          runsStatusEl.textContent = `Showing ${runs.length} most recent runs.`;
        })
        .catch(() => {
          runsStatusEl.textContent = "Unable to load recent runs.";
        });
    })();
  </script>
</body>
</html>
