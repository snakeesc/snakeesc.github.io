<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>escape the snake 🐍 – player runs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay-bg {
      position: relative;
      width: 100%;
      max-width: 960px;
    }

    .panel {
      background: #111;
      padding: 18px 22px;
      border-radius: 10px;
      border: 1px solid #444;
      color: #fff;
      text-align: left;
      box-shadow: 0 0 18px rgba(0,0,0,0.6);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .subtitle {
      margin-bottom: 14px;
      font-size: 13px;
      opacity: 0.9;
    }

    .status {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 12px;
    }

    .runs-table-wrap {
      overflow-x: auto;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0b0b0b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: #181818;
    }

    th, td {
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid #222;
      white-space: nowrap;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.9;
    }

    tbody tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    .num {
      text-align: right;
    }

    .small-note {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 12px;
    }

    a {
      color: #9bffb1;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9518470870792689"
      crossorigin="anonymous"></script>
</head>
<body>
  <div class="overlay-bg">
    <div class="panel">
      <div class="title">escape the snake 🐍</div>
      <div class="subtitle">-- Player Run Log --</div>

      <div id="status" class="status">Loading runs…</div>

      <div class="runs-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Player</th>
              <th class="num">Score</th>
              <th class="num">Time (s)</th>
              <th class="num">Frogs</th>
              <th class="num">Snakes</th>
            </tr>
          </thead>
          <tbody id="runsBody"></tbody>
        </table>
      </div>

      <div class="small-note">
        showing recent completed runs from
        <a href="https://snakeesc.github.io/">snakeesc.github.io</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const WORKER_BASE = "https://lucky-king-0d37.danielssouthworth.workers.dev";
      const statusEl = document.getElementById("status");
      const runsBodyEl = document.getElementById("runsBody");

      function formatDate(value) {
        if (!value) return "—";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString();
      }

      function safeNum(value, fallback = "—") {
        return Number.isFinite(Number(value)) ? Number(value).toLocaleString() : fallback;
      }

      fetch(WORKER_BASE + "/runs")
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          const runs = Array.isArray(data?.runs) ? data.runs : Array.isArray(data) ? data : null;

          if (!runs || !runs.length) {
            statusEl.textContent = "No runs found.";
            return;
          }

          runsBodyEl.innerHTML = "";

          runs.forEach((run) => {
            const tr = document.createElement("tr");

            const dateTd = document.createElement("td");
            dateTd.textContent = formatDate(run.createdAt || run.timestamp || run.date);

            const playerTd = document.createElement("td");
            playerTd.textContent = (run.tag && run.tag.trim()) || "Anonymous Frog";

            const scoreTd = document.createElement("td");
            scoreTd.className = "num";
            scoreTd.textContent = safeNum(run.score);

            const timeTd = document.createElement("td");
            timeTd.className = "num";
            timeTd.textContent = Number.isFinite(Number(run.timeSeconds))
              ? Number(run.timeSeconds).toFixed(1)
              : Number.isFinite(Number(run.bestTime))
              ? Number(run.bestTime).toFixed(1)
              : "—";

            const frogsTd = document.createElement("td");
            frogsTd.className = "num";
            frogsTd.textContent = safeNum(run.totalFrogsSpawned ?? run.frogs);

            const snakesTd = document.createElement("td");
            snakesTd.className = "num";
            snakesTd.textContent = safeNum(run.snakesSeen ?? run.snakes);

            tr.appendChild(dateTd);
            tr.appendChild(playerTd);
            tr.appendChild(scoreTd);
            tr.appendChild(timeTd);
            tr.appendChild(frogsTd);
            tr.appendChild(snakesTd);

            runsBodyEl.appendChild(tr);
          });

          statusEl.textContent = `Showing ${runs.length} recent runs.`;
        })
        .catch(() => {
          statusEl.textContent = "Unable to load run log.";
        });
    })();
  </script>
</body>
</html>
