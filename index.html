<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Escape the Snake</title>
  <link rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20y%3D%27.9em%27%20font-size%3D%2790%27%3E%F0%9F%90%8D%3C%2Ftext%3E%3C%2Fsvg%3E">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9Q540R6FC5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-9Q540R6FC5');
  </script>
  
  <meta name="viewport" id="vp" content="width=1024, initial-scale=1, viewport-fit=cover">
  <script>
    (function () {
      const BASE = 1024;
      const w = Math.min(window.innerWidth || BASE, screen.width || BASE);
      const s = w / BASE;
      const vp = document.getElementById("vp");
      vp.setAttribute(
        "content",
        `width=${BASE}, initial-scale=${s}, maximum-scale=${s}, viewport-fit=cover`
      );
    })();
  </script>

  <!-- Adjust path if your CSS is elsewhere -->
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    #frog-game {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9518470870792689"
     crossorigin="anonymous"></script>
</head>
<body>
  <!-- data-snake-game turns on snake logic in scatter-frogs.js -->
  <div id="frog-game"></div>

  <!-- MAIN MENU OVERLAY -->
  <div id="mainMenuOverlay" class="frog-overlay">
    <div class="frog-panel" style="background:transparent !important; border:none; box-shadow:none; min-width:300px; max-width:360px; text-align:center;">
      <div class="frog-panel-title" style="font-size:24px; margin-bottom:4px;">
        🐍 Escape the Snake
      </div>
      <div class="frog-panel-sub" style="margin-bottom:20px;">
        Keep your frogs alive as long as you can
      </div>

      <button id="btnStartRun" class="frog-btn frog-btn-primary" style="font-size:15px; padding:12px; margin-bottom:12px;">
        ▶ Start Run
      </button>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:7px;">
        <button id="btnHowTo"      class="frog-btn frog-btn-secondary" style="margin:0;">❓ How to Play</button>
        <button id="btnBuffGuide"  class="frog-btn frog-btn-secondary" style="margin:0;">⚡ Upgrades</button>
        <button id="btnLeaderboard" class="frog-btn frog-btn-secondary" style="margin:0;">🏆 Leaderboard</button>
        <button id="btnDashboard"  class="frog-btn frog-btn-secondary" style="margin:0;">👤 Dashboard</button>
      </div>
    </div>
  </div>

  <!-- UPGRADE SELECTION OVERLAY -->
  <div id="upgradeOverlay" class="frog-overlay">
    <div class="frog-panel">
      <div class="frog-panel-title">
        <!-- hidden via CSS, keep for structure -->
        Choose an upgrade
      </div>

      <div id="upgradeOverlaySub" class="frog-panel-sub"></div>

      <div class="upgrade-layout">
        <!-- LEFT: upgrade options -->
        <div class="upgrade-column upgrade-column-choices">
          <div id="upgradeChoicesContainer" class="upgrade-choices">
            <!-- buttons injected by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- HOW TO PLAY OVERLAY -->
  <div id="howToOverlay" class="frog-overlay">
    <div class="frog-panel" style="max-width:420px;">
      <div class="frog-panel-title">❓ How to Play</div>
      <div class="frog-panel-sub">Survive as long as possible. Don't let the snake eat all your frogs.</div>
      <!-- content injected by JS showHowToOverlay() -->
      <div class="frog-panel-footer">
        <button id="howToCloseBtn" class="frog-btn frog-btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <!-- BUFF / UPGRADE GUIDE OVERLAY -->
  <div id="buffGuideOverlay" class="frog-overlay">
    <div class="frog-panel" style="max-width:560px; width:min(560px,92vw);">
      <!-- fully injected by showBuffGuideOverlay() -->
    </div>
  </div>

  <!-- LEADERBOARD OVERLAY -->
  <div id="leaderboardOverlay" class="frog-overlay">
    <div class="frog-panel" style="max-width:480px; width:min(480px,92vw);">
      <div class="frog-panel-title">🏆 Leaderboard</div>
      <div id="leaderboardContent"></div>
      <div class="frog-panel-footer">
        <button id="leaderboardCloseBtn" class="frog-btn frog-btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD OVERLAY -->
  <div id="dashboardOverlay" class="frog-overlay">
    <div class="frog-panel" style="max-width:500px; width:min(500px,92vw);">
      <div class="frog-panel-title">👤 Dashboard</div>
      <div id="dashboardContent"><div class="leaderboard-loading">Loading…</div></div>
      <div class="frog-panel-footer">
        <button id="dashboardCloseBtn" class="frog-btn frog-btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <script src="frog-game-config.js"></script>
  <script src="frog-game-utils.js"></script>
  <script src="frog-audio.js"></script>
  <script src="frog-leaderboard.js"></script>
  <script src="frog-game.js"></script>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "02f1ec21acba45f38ae0a30210c222d1"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
