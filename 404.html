<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 · Escape the Snake</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20y%3D%27.9em%27%20font-size%3D%2790%27%3E%F0%9F%90%8D%3C%2Ftext%3E%3C%2Fsvg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    #frog-bg {
      position: fixed;
      inset: 0;
    }
    .overlay-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="frog-bg"><div class="grass-field" id="grassField"></div></div>

  <div class="overlay-wrap">
    <div class="frog-panel" style="max-width:480px;width:100%;text-align:center;">

      <div class="frog-panel-title">
        404
        <span class="emoji">🐍</span>
      </div>

      <div class="frog-panel-sub">
        The snake ate this page.<br>
        Whatever you were looking for hopped away.
      </div>

      <div class="frog-panel-section-label">Where to go</div>

      <ul class="frog-panel-list" style="text-align:left;">
        <li><a href="/" style="color:#a3e635;text-decoration:none;">🐸 Play the game</a> — survive as long as you can</li>
        <li><a href="/recent" style="color:#a3e635;text-decoration:none;">🕐 Recent Runs</a> — see what other players have been up to</li>
      </ul>

      <div class="frog-panel-footer" style="margin-top:20px;">
        <button class="frog-btn frog-btn-primary" onclick="window.location.href='/'" style="max-width:200px;margin:0 auto;">
          Back to game
        </button>
      </div>

    </div>
  </div>

  <script>
    (function() {
      const field = document.getElementById("grassField");
      if (!field) return;
      const count = Math.floor((window.innerWidth * window.innerHeight) / 24000);
      for (let i = 0; i < count; i++) {
        const tuft = document.createElement("div");
        tuft.className = `grass variant-${1 + Math.floor(Math.random() * 4)}`;
        tuft.style.cssText = `left:${Math.random()*window.innerWidth}px;top:${Math.random()*window.innerHeight}px;transform:scale(${0.8+Math.random()*0.55});animation-duration:${2.5+Math.random()*2.5}s`;
        ["b1","b2","b3","b4"].forEach(c => {
          const b = document.createElement("div");
          b.className = "blade " + c;
          tuft.appendChild(b);
        });
        field.appendChild(tuft);
      }
    })();
  </script>
</body>
</html>
