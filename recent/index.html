<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recent Runs · Escape the Snake</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20y%3D%27.9em%27%20font-size%3D%2790%27%3E%F0%9F%90%8D%3C%2Ftext%3E%3C%2Fsvg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #bfe8ab;
      font-family: monospace;
      color: white;
    }

    .rr-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 28px 16px 56px;
    }

    .rr-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .rr-title {
      font-size: 20px;
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px rgba(0,0,0,0.4);
    }

    .rr-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rr-back {
      font-size: 12px;
      color: white;
      text-decoration: none;
      opacity: 0.8;
    }

    .rr-back:hover { opacity: 1; text-decoration: underline; }

    .rr-meta {
      font-size: 11px;
      color: white;
      opacity: 0.55;
      margin-bottom: 12px;
    }

    .rr-card {
      background: #1c1917;
      border-radius: 14px;
      padding: 18px 22px 16px;
      margin-bottom: 12px;
    }

    .rr-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a3e635;
      margin-bottom: 8px;
    }

    .rr-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .rr-list li {
      font-size: 13px;
      line-height: 1.5;
      color: #f5f5f4;
      margin-bottom: 6px;
    }

    .rr-ts {
      font-size: 10px;
      color: #57534e;
      margin-left: 4px;
    }

    .rr-pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .rr-pager-info {
      font-size: 11px;
      color: #a8a29e;
    }

    .rr-btn {
      background: #292524;
      color: white;
      border: 1px solid #44403c;
      border-radius: 10px;
      padding: 6px 16px;
      font-size: 12px;
      font-family: monospace;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.1s, transform 0.1s;
    }

    .rr-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
    .rr-btn:disabled { opacity: 0.35; cursor: default; }

    .rr-btn-refresh {
      background: #292524;
      color: white;
      border: 1px solid #44403c;
      border-radius: 10px;
      padding: 6px 14px;
      font-size: 12px;
      font-family: monospace;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.1s, transform 0.1s;
    }

    .rr-btn-refresh:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .rr-loading {
      font-size: 13px;
      color: #a8a29e;
      text-align: center;
      padding: 12px 0 6px;
    }
  </style>
</head>
<body>

  <div class="rr-wrap">

    <div class="rr-header">
      <h1 class="rr-title">🐍 Recent Runs</h1>
      <div class="rr-nav">
        <button id="refreshBtn" class="rr-btn-refresh">↺ Refresh</button>
        <a class="rr-back" href="/">← Back to game</a>
      </div>
    </div>

    <div class="rr-meta" id="metaLine">Global · newest first · loading…</div>

    <div class="rr-card">
      <div class="rr-label">Global Stats</div>
      <div id="statsContent"><div class="rr-loading">Loading…</div></div>
    </div>

    <div class="rr-card">
      <div class="rr-label">Recent Runs</div>
      <div id="runsContent"><div class="rr-loading">Loading…</div></div>
      <div class="rr-pager" id="pager" style="display:none;">
        <span class="rr-pager-info" id="pageInfo"></span>
        <div style="display:flex; gap:8px;">
          <button class="rr-btn" id="prevBtn" disabled>Prev</button>
          <button class="rr-btn" id="nextBtn">Next</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    const RECENT_RUNS_URL = "https://lucky-king-0d37.danielssouthworth.workers.dev/recent-runs";
    const SUMMARY_URL     = "https://lucky-king-0d37.danielssouthworth.workers.dev/updates-summary";
    const PAGE_SIZE = 25;
    const MAX_RUNS  = 100;

    let allRuns = [];
    let currentPage = 0;

    function pad2(n) { return n < 10 ? "0" + n : String(n); }

    function fmtTime(s) {
      if (!s || !isFinite(s) || s <= 0) return "00:00.0";
      const m = Math.floor(s / 60);
      const sec = (s - m * 60).toFixed(1);
      return pad2(m) + ":" + sec.padStart(4, "0");
    }

    function fmtTs(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) +
             " · " + d.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    function esc(s) {
      if (s == null) return "";
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function fmtDuration(s) {
      s = Math.max(0, Math.floor(Number(s) || 0));
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${s % 60}s`;
      return `${s}s`;
    }

    async function loadStats() {
      const el = document.getElementById("statsContent");
      try {
        const data = await (await fetch(SUMMARY_URL)).json();
        el.innerHTML = `<ul class="rr-list">
          <li>${(data.totalUsers||0).toLocaleString()} players · ${(data.totalRuns||0).toLocaleString()} runs · ${fmtDuration(data.totalPlaytime)} played</li>
          <li>${(data.totalFrogsEaten||0).toLocaleString()} frogs eaten · ${(data.totalScore||0).toLocaleString()} total score</li>
        </ul>`;
      } catch {
        el.innerHTML = '<div class="rr-loading">Could not load stats.</div>';
      }
    }

    function renderPage(pageIndex) {
      const totalPages = Math.max(1, Math.ceil(allRuns.length / PAGE_SIZE));
      currentPage = Math.max(0, Math.min(pageIndex, totalPages - 1));
      const start = currentPage * PAGE_SIZE;
      const end   = Math.min(start + PAGE_SIZE, allRuns.length);
      const el    = document.getElementById("runsContent");
      const pager = document.getElementById("pager");

      if (!allRuns.length) {
        el.innerHTML = '<div class="rr-loading">No runs yet — be the first!</div>';
        pager.style.display = "none";
        return;
      }

      el.innerHTML = `<ul class="rr-list">${allRuns.slice(start, end).map(r => `
        <li>
          <strong>${esc(r.tag || "Frog")}</strong>
          · ${fmtTime(r.time)} · ${Math.floor(r.score||0)} score · ${r.orbs||0} orbs · ${r.sheds||0} sheds
          <span class="rr-ts">${fmtTs(r.at)}</span>
        </li>`).join("")}</ul>`;

      pager.style.display = "flex";
      document.getElementById("pageInfo").textContent = `Showing ${start+1}–${end} of ${allRuns.length}`;
      document.getElementById("prevBtn").disabled = currentPage === 0;
      document.getElementById("nextBtn").disabled = end >= allRuns.length;
    }

    async function loadRuns() {
      document.getElementById("runsContent").innerHTML = '<div class="rr-loading">Loading…</div>';
      document.getElementById("pager").style.display = "none";
      try {
        const data = await (await fetch(RECENT_RUNS_URL)).json();
        allRuns = Array.isArray(data.runs) ? data.runs.slice(0, MAX_RUNS) : [];
        const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        document.getElementById("metaLine").textContent =
          `Global · newest first · ${allRuns.length} runs · updated ${now}`;
        renderPage(0);
      } catch {
        document.getElementById("runsContent").innerHTML = '<div class="rr-loading">Failed to load runs.</div>';
      }
    }

    document.getElementById("prevBtn").addEventListener("click", () => renderPage(currentPage - 1));
    document.getElementById("nextBtn").addEventListener("click", () => renderPage(currentPage + 1));
    document.getElementById("refreshBtn").addEventListener("click", () => { loadStats(); loadRuns(); });

    loadStats();
    loadRuns();
  </script>
</body>
</html>
